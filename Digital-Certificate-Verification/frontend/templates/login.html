{% extends "base.html" %}

{% block title %}Issuer Portal Login | CertifySecure{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 450px; margin: 3rem auto; text-align: center;">
    <div style="margin-bottom: 2rem;">
        <i class="fas fa-user-shield" style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;"></i>
        <h2>Issuer Administration</h2>
        <p style="color: var(--text-secondary); font-size: 0.875rem;">Access the cryptographic signing dashboard</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group" style="margin-bottom: 2rem;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;" id="btn-login-submit">
            <i class="fas fa-sign-in-alt"></i> Authenticate & Enter
        </button>
    </form>
</div>
{% endblock %}
